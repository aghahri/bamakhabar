# تنظیمات Render برای باماخبر (Next.js)
# در Dashboard: New → Blueprint یا دستی Web Service با مشخصات زیر

services:
  - type: web
    name: bamakhabar
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx prisma db seed && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: bamakhabar-db
          property: connectionString

databases:
  - name: bamakhabar-db
    plan: free
    region: frankfurt
