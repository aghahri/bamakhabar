# کانفیگ Nginx برای iranregions.com
# این فایل را روی سرور کپی کن و فقط این را اضافه کن؛ فایل باماخبر را دست نزن.
#
# روی سرور:
#   sudo cp nginx-iranregions.conf /etc/nginx/sites-available/iranregions
#   sudo ln -s /etc/nginx/sites-available/iranregions /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# پورت زیر (5001) را با پورتی که اپ نقشه واقعاً روی آن گوش می‌دهد عوض کن.

server {
    listen 80;
    server_name iranregions.com www.iranregions.com;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
